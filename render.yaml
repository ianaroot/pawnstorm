databases:
  - name: upcp
    databaseName: upcp
    user: ianaroot
    plan: free

services:
  - type: web
    name: upcp
    runtime: ruby
    plan: starter
    buildCommand: "./bin/render-build.sh"
    preDeployCommand: "bundle exec rails db:migrate"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upcp
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2 # sensible default
  - type: worker
    name: upcp-jobs
    runtime: ruby
    plan: starter
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec good_job start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upcp
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
  - type: cron
    name: guest-cleanup
    runtime: ruby
    schedule: "0 4 * * 0"
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rake guests:cleanup_inactive"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upcp
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
